<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hierarchy Builder</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    p.subtitle {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    h2 {
      margin-top: 25px;
    }

    pre {
      background: #1e1e1e;
      color: #00ffcc;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      overflow-x: auto;
      line-height: 1.5;
    }

    .error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }

    .loader {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      color: #667eea;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Hierarchy Builder</h1>
    <p class="subtitle">Enter node relationships and view structured output</p>

    <textarea id="input" placeholder="Example: A->B, A->C, B->D"></textarea>

    <button onclick="submitData()">Submit</button>

    <div class="loader" id="loading"></div>
    <div class="error" id="error"></div>

    <h2>Output</h2>
    <pre id="result"></pre>
  </div>

<script>
async function submitData() {
  const input = document.getElementById("input").value;
  const resultDiv = document.getElementById("result");
  const errorDiv = document.getElementById("error");
  const loadingDiv = document.getElementById("loading");

  resultDiv.innerText = "";
  errorDiv.innerText = "";

  if (!input.trim()) {
    errorDiv.innerText = "Please enter some data.";
    return;
  }

  const dataArray = input.split(",").map(x => x.trim());

  try {
    loadingDiv.innerText = "Loading...";

    const response = await fetch("https://bfhl-project-t458.onrender.com/bfhl", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ data: dataArray })
    });

    if (!response.ok) throw new Error();

    const data = await response.json();

    loadingDiv.innerText = "";

   
    resultDiv.innerText = JSON.stringify(data, null, 2);

  } catch (err) {
    loadingDiv.innerText = "";
    errorDiv.innerText = "Failed to fetch data. Please check your backend.";
  }
}
</script>

</body>
</html>
